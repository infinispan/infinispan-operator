name: Automated Backporting

on:
  pull_request_target:
    types:
      - closed
    branches:
      - main

permissions:
  contents: read

jobs:
  create_backport:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - if: contains(github.event.pull_request.labels.*.name, '2.3.x')
        name: 2.3.x Backport
        uses: kiegroup/git-backporting@08da0b07ef2330d189f6074ec8db736b3aa9f465 # v4.9.1
        with:
          target-branch: 2.3.x
          pull-request: ${{ github.event.pull_request.url }}
          auth: ${{ secrets.INFINISPAN_RELEASE_TOKEN }}
          no-squash: true

      - if: contains(github.event.pull_request.labels.*.name, '2.4.x')
        name: 2.4.x Backport
        uses: kiegroup/git-backporting@08da0b07ef2330d189f6074ec8db736b3aa9f465 # v4.9.1
        with:
          target-branch: 2.4.x
          pull-request: ${{ github.event.pull_request.url }}
          auth: ${{ secrets.INFINISPAN_RELEASE_TOKEN }}
          no-squash: true

      - if: contains(github.event.pull_request.labels.*.name, 'stable')
        name: Stable Backport
        uses: kiegroup/git-backporting@08da0b07ef2330d189f6074ec8db736b3aa9f465 # v4.9.1
        with:
          target-branch: stable
          pull-request: ${{ github.event.pull_request.url }}
          auth: ${{ secrets.INFINISPAN_RELEASE_TOKEN }}
          no-squash: true
