apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: config-listener-role
  namespace: <namespace>
rules:
  - apiGroups: ["infinispan.org"]
    resources: ["caches"]
    verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]
  - apiGroups: ["infinispan.org"]
    resources: ["infinispans"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["list"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: config-listener-rolebinding
  namespace: <namespace>
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: config-listener-role
subjects:
  - kind: ServiceAccount
    name: custom-config-listener-sa
    namespace: <namespace>
